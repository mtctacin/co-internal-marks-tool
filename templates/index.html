<!DOCTYPE html>
<html>

<head>
<title>CCA Tool</title>

<style>
body { font-family: Arial; margin: 40px; }
.container { width: 500px; }
input, select, button {
width: 100%;
padding: 10px;
margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

<h2>CCA Marks Tool</h2>

<a href="/download-template">
<button>Download Marks Template</button>
</a>

<hr>

<form action="/process" method="post" enctype="multipart/form-data">

<input name="college" placeholder="College Name" required>
<input name="course_code" placeholder="Course Code" required>
<input name="course_name" placeholder="Course Name" required>
<input name="year" placeholder="Academic Year" required>
<input name="semester" placeholder="Semester" required>

<select name="category" required>
<option value="">CCA Category</option>
<option>Theory</option>
<option>Practical</option>
</select>

<label>Upload Filled Template</label>
<input type="file" name="marks_file" required>

<button type="submit">Process</button>

</form>

</div>

</body>
</html>
